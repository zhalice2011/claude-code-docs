name: Update Claude Documentation

on:
  schedule:
    # Run every 3 hours (at 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Documentation source to update (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'claude-code'
          - 'platform'

permissions:
  contents: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Fetch latest documentation
      id: fetch-docs
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        SOURCE_FILTER="${{ github.event.inputs.source }}"
        if [ -n "$SOURCE_FILTER" ]; then
          echo "Fetching only: $SOURCE_FILTER"
          python scripts/fetch_claude_docs.py "$SOURCE_FILTER" || echo "fetch_failed=true" >> $GITHUB_OUTPUT
        else
          echo "Fetching all sources"
          python scripts/fetch_claude_docs.py || echo "fetch_failed=true" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true

    - name: Check for changes
      id: verify-changed-files
      run: |
        git diff --exit-code || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Generate commit message
      if: steps.verify-changed-files.outputs.changed == 'true'
      id: commit-msg
      run: |
        # Stage changes to see what will be committed
        git add -A docs/

        # Count changes by source
        CLAUDE_CODE_CHANGES=$(git diff --name-status --cached | grep -E "^[AMD]\s+docs/[^/]+\.md$" | wc -l | tr -d ' ')
        PLATFORM_CHANGES=$(git diff --name-status --cached | grep -E "^[AMD]\s+docs/platform/" | wc -l | tr -d ' ')

        # Get sample of changed files (limit to avoid overly long messages)
        CHANGED_SAMPLE=$(git diff --name-status --cached | grep -E "\.md$" | head -5 | cut -f2 | sed 's/docs\///' | paste -sd ", " -)

        # Build commit message
        COMMIT_MSG="Update Claude docs - $(date +'%Y-%m-%d')"

        if [ "$CLAUDE_CODE_CHANGES" -gt 0 ]; then
          COMMIT_MSG="$COMMIT_MSG | claude-code: $CLAUDE_CODE_CHANGES files"
        fi

        if [ "$PLATFORM_CHANGES" -gt 0 ]; then
          COMMIT_MSG="$COMMIT_MSG | platform: $PLATFORM_CHANGES files"
        fi

        # Add sample if not too many files
        TOTAL_CHANGES=$((CLAUDE_CODE_CHANGES + PLATFORM_CHANGES))
        if [ "$TOTAL_CHANGES" -le 10 ] && [ -n "$CHANGED_SAMPLE" ]; then
          COMMIT_MSG="$COMMIT_MSG | $CHANGED_SAMPLE"
        fi

        echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT

    - name: Commit and push if changed
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # Files already staged in previous step
        git commit -m "${{ steps.commit-msg.outputs.message }}"
        git push

    - name: Create issue on failure
      if: steps.fetch-docs.outputs.fetch_failed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Documentation update failed - ${date}`,
            body: `The automated documentation update failed on ${date}.\n\nPlease check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
            labels: ['bug', 'automation']
          })
